name: Test Build

on:
  push:
    branches:
      - release
      - 'beta-*'
    paths:
      - '**'
      # - '!**/assets/**'
      # - '!**.md'
      - '!**/ISSUE_TEMPLATE/**'
      - '!**/modules/web/**'
  pull_request:
    paths-ignore:
      - '**/modules/web/**'
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: write

jobs:

  prepare:
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.set-ver.outputs.version }}
      versionL: ${{ steps.set-ver.outputs.versionL }}
      channel: ${{ steps.release-info.outputs.channel }}
      publish: ${{ steps.release-info.outputs.publish }}
      prerelease: ${{ steps.release-info.outputs.prerelease }}
      tag_name: ${{ steps.release-info.outputs.tag_name }}
      release_body: ${{ steps.release-info.outputs.body }}
      build_matrix: ${{ steps.set-matrix.outputs.build_matrix }}
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0
      - id: set-ver
        run: |
          echo "version=$(date -d "8 hour" -u +3.%y.%m%d%H)" >> $GITHUB_OUTPUT
          echo "versionL=$(date -d "8 hour" -u +3.%y.%m%d%H%M)" >> $GITHUB_OUTPUT
      - id: release-info
        run: |
          REF_NAME="${GITHUB_REF_NAME}"
          CHANNEL="beta"
          PUBLISH="false"
          PRERELEASE="true"
          TAG_NAME="beta"

          if [[ "$REF_NAME" == "release" ]]; then
            CHANNEL="release"
            PUBLISH="true"
            PRERELEASE="false"
            TAG_NAME="${{ steps.set-ver.outputs.version }}"
          elif [[ "$REF_NAME" == beta-* ]]; then
            CHANNEL="beta"
            PUBLISH="true"
            PRERELEASE="true"
            TAG_NAME="beta"
          fi

          if [[ "$CHANNEL" == "release" ]]; then
            LAST_TAG=$(git tag --list '3.*' --sort=-v:refname | head -n 1)
            if [ -n "$LAST_TAG" ]; then
              COMMIT_RANGE="$LAST_TAG..HEAD"
            else
              COMMIT_RANGE="HEAD~20..HEAD"
            fi
          elif git rev-parse -q --verify refs/tags/beta >/dev/null; then
            COMMIT_RANGE="beta..HEAD"
          elif [ "${{ github.event_name }}" == "push" ] && [ "${{ github.event.before }}" != "0000000000000000000000000000000000000000" ]; then
            COMMIT_RANGE="${{ github.event.before }}..${{ github.sha }}"
          else
            COMMIT_RANGE="HEAD~20..HEAD"
          fi

          echo "DEBUG: REF_NAME=$REF_NAME"
          echo "DEBUG: CHANNEL=$CHANNEL PUBLISH=$PUBLISH PRERELEASE=$PRERELEASE TAG_NAME=$TAG_NAME"
          echo "DEBUG: COMMIT_RANGE=$COMMIT_RANGE"

          UPDATED_CONTENT=""
          if git rev-parse "$COMMIT_RANGE" >/dev/null 2>&1; then
            UPDATED_CONTENT=$(git log "$COMMIT_RANGE" --pretty=format:"* %s" --reverse 2>/dev/null \
              | grep -vE '^\* (Merge|Sync upstream)' \
              | grep -vE '^\* $' || true)
          else
            echo "DEBUG: invalid commit range, fallback to last commit"
          fi

          if [ -z "$UPDATED_CONTENT" ]; then
            UPDATED_CONTENT=$(git log -1 --pretty=format:"* %s")
          fi

          CONTENT_JSON=$(echo "$UPDATED_CONTENT" | jq -Rs . 2>/dev/null || echo "\"Error generating update content\"")
          echo "channel=$CHANNEL" >> $GITHUB_OUTPUT
          echo "publish=$PUBLISH" >> $GITHUB_OUTPUT
          echo "prerelease=$PRERELEASE" >> $GITHUB_OUTPUT
          echo "tag_name=$TAG_NAME" >> $GITHUB_OUTPUT
          echo "body=$CONTENT_JSON" >> $GITHUB_OUTPUT
      - id: set-matrix
        run: |
          echo 'build_matrix={"product":["app"],"type":["release"]}' >> $GITHUB_OUTPUT

  build:
    needs: prepare
    strategy:
      matrix: ${{ fromJson(needs.prepare.outputs.build_matrix) }}
      fail-fast: false
    runs-on: ubuntu-latest
    env:
      product: ${{ matrix.product }}
      type: ${{ matrix.type }}
      VERSION: ${{ needs.prepare.outputs.version }}
      VERSIONL: ${{ needs.prepare.outputs.versionL }}
      CHANNEL: ${{ needs.prepare.outputs.channel }}
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0
      - name: Set up JDK 17
        uses: actions/setup-java@v5
        with:
          distribution: 'temurin'
          java-version: 17
      - name: Clear 18PlusList.txt
        run: |
          echo "清空18PlusList.txt"
          echo "">$GITHUB_WORKSPACE/app/src/main/assets/18PlusList.txt
      - name: Generate Runtime Update Log
        env:
          UPDATE_LOG_CONTENT: ${{ fromJSON(needs.prepare.outputs.release_body) }}
        run: |
          {
            echo "**$(date -d "8 hour" -u +%Y-%m-%d)**"
            echo
            printf '%s\n' "$UPDATE_LOG_CONTENT"
          } > "$GITHUB_WORKSPACE/app/src/main/assets/updateLog.md"
      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v5

      - name: Release Apk Sign
        env:
          RELEASE_KEY_STORE: ${{ secrets.RELEASE_KEY_STORE }}
          RELEASE_KEY_ALIAS: ${{ secrets.RELEASE_KEY_ALIAS }}
          RELEASE_KEY_PASSWORD: ${{ secrets.RELEASE_KEY_PASSWORD }}
          RELEASE_STORE_PASSWORD: ${{ secrets.RELEASE_STORE_PASSWORD }}
        run: |
          if [ -z "$RELEASE_KEY_STORE" ]; then
            echo "RELEASE_KEY_STORE not configured, build will use unsigned release output."
            exit 0
          fi
          if [ -z "$RELEASE_KEY_ALIAS" ] || [ -z "$RELEASE_KEY_PASSWORD" ] || [ -z "$RELEASE_STORE_PASSWORD" ]; then
            echo "Release signing secrets are incomplete."
            exit 1
          fi
          echo -e "\n" >> gradle.properties
          echo RELEASE_KEY_ALIAS="$RELEASE_KEY_ALIAS" >> gradle.properties
          echo RELEASE_KEY_PASSWORD="$RELEASE_KEY_PASSWORD" >> gradle.properties
          echo RELEASE_STORE_PASSWORD="$RELEASE_STORE_PASSWORD" >> gradle.properties
          echo RELEASE_STORE_FILE="./key.jks" >> gradle.properties
          echo "$RELEASE_KEY_STORE" | base64 --decode > "$GITHUB_WORKSPACE/app/key.jks"

      - name: Build With Gradle
        continue-on-error: true
        run: |
          typeName="${{ env.CHANNEL }}"
          echo "统一版本号"
          sed "/def version/c def version = \"${{ env.VERSION }}\"" $GITHUB_WORKSPACE/app/build.gradle  -i
          echo "开始${{ env.product }}$typeName构建"
          chmod +x gradlew
          ./gradlew assemble${{ env.product }}release --build-cache --parallel --daemon --warning-mode all
          echo "修改APK文件名"
          mkdir -p ${{ github.workspace }}/apk/
          for file in `ls ${{ github.workspace }}/app/build/outputs/apk/*/*/*.apk`; do
            mv "$file" ${{ github.workspace }}/apk/legado_NG_${{ env.VERSIONL }}_$typeName.apk
          done
          echo "移动mapping文件"
          mkdir -p ${{ github.workspace }}/mapping/
          for file in `ls ${{ github.workspace }}/app/build/outputs/mapping/*/mapping.txt`; do
            mv "$file" ${{ github.workspace }}/mapping/mapping.txt
          done

      - name: Move Missing Rules Files
        run: |
          echo "移动missing_rules.txt文件"
          mkdir -p ${{ github.workspace }}/mapping/
          for file in `ls ${{ github.workspace }}/app/build/outputs/mapping/*/missing_rules.txt`; do
            mv "$file" ${{ github.workspace }}/mapping/missing_rules.txt
          done

      - name: Upload Missing Rules File To Artifact
        uses: actions/upload-artifact@v7
        with:
          name: legado.${{ env.product }}.${{ env.CHANNEL }}.mapping.missing_rules
          if-no-files-found: ignore
          path: ${{ github.workspace }}/mapping/missing_rules.txt

      - name: Check Build production
        run: |
          if [ ! -d ${{ github.workspace }}/apk ]; then
            echo "Build production not found! Check gradle logs."
            exit 1
          fi
          cd ${{ github.workspace }}/apk/
          if [ ! -e legado_*.apk ]; then
            echo "Build production not found! Check gradle logs."
            exit 1
          fi

      - name: Upload App To Artifact
        uses: actions/upload-artifact@v7
        with:
          name: legado.${{ env.product }}.${{ env.CHANNEL }}
          if-no-files-found: ignore
          path: ${{ github.workspace }}/apk/*.apk

      - name: Upload Mapping File To Artifact
        uses: actions/upload-artifact@v7
        with:
          name: legado.${{ env.product }}.${{ env.CHANNEL }}.mapping
          if-no-files-found: ignore
          path: ${{ github.workspace }}/mapping/mapping.txt

  publish:
    needs: [ prepare, build ]
    if: github.event_name != 'pull_request' && github.repository == 'joestar817/legado_NG' && needs.prepare.outputs.publish == 'true'
    runs-on: ubuntu-latest
    env:
      VERSION: ${{ needs.prepare.outputs.version }}
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 1
      - uses: actions/download-artifact@v8
        with:
          path: apk/

      - working-directory: apk/
        run: |
          mv */*.apk .
          rm -rf */

      - name: Delete Beta Release
        if: needs.prepare.outputs.channel == 'beta'
        run: |
          if gh release view beta &>/dev/null; then
            gh release delete beta -y
          fi
        env:
          GH_TOKEN: ${{ github.token }}

      - name: Create or update beta tag
        if: needs.prepare.outputs.channel == 'beta'
        uses: richardsimko/update-tag@v1
        with:
          tag_name: beta
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Publish Release
        uses: softprops/action-gh-release@v2
        with:
          name: legado_ng_${{ env.VERSION }}
          tag_name: ${{ needs.prepare.outputs.tag_name }}
          body: |
            ### 更新内容
            ${{ fromJSON(needs.prepare.outputs.release_body) }}
          prerelease: ${{ needs.prepare.outputs.prerelease }}
          files: ${{ github.workspace }}/apk/*.apk
          fail_on_unmatched_files: true
